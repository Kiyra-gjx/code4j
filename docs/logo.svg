<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="#1E1E2E"/>

  <!-- Inner terminal outline -->
  <rect x="10" y="10" width="80" height="80" rx="18" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Terminal title bar -->
  <rect x="10" y="10" width="80" height="14" rx="18"/>
  <rect x="10" y="20" width="80" height="4" fill="#2D5A8E"/>
  <circle cx="19" cy="17" r="2.5" fill="#F7768E"/>
  <circle cx="27" cy="17" r="2.5" fill="#E0AF68"/>
  <circle cx="35" cy="17" r="2.5" fill="#9ECE6A"/>

  <!-- Code bracket: < -->
  <polyline points="42,65 30,50 42,35" stroke="#7DCFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The "4" -->
  <polyline points="52,35 60,35 60,50 52,50" stroke="#F7768E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="55" y1="50" x2="62" y2="50" stroke="#F7768E" stroke-width="4" stroke-linecap="round"/>

  <!-- Code bracket: > -->
  <polyline points="68,65 80,50 68,35" stroke="#7DCFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor blink -->
  <rect x="72" y="40" width="3" height="12" rx="1" fill="#A9B1D6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
